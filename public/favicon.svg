<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#2563eb"/>
  <!-- Rail tracks -->
  <rect x="6" y="22" width="20" height="2" rx="1" fill="white" opacity="0.4"/>
  <rect x="9" y="20" width="2" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="14.5" y="20" width="2" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="20" y="20" width="2" height="4" rx="0.5" fill="white" opacity="0.4"/>
  <!-- Locomotive body -->
  <rect x="5" y="11" width="18" height="10" rx="2" fill="white"/>
  <!-- Cab -->
  <rect x="18" y="8" width="7" height="8" rx="2" fill="white"/>
  <!-- Windows -->
  <rect x="7" y="13" width="4" height="3" rx="1" fill="#2563eb" opacity="0.6"/>
  <rect x="13" y="13" width="4" height="3" rx="1" fill="#2563eb" opacity="0.6"/>
  <rect x="20" y="10" width="3" height="3" rx="0.5" fill="#2563eb" opacity="0.6"/>
  <!-- Wheels -->
  <circle cx="10" cy="22" r="2" fill="#1d4ed8" stroke="white" stroke-width="1"/>
  <circle cx="17" cy="22" r="2" fill="#1d4ed8" stroke="white" stroke-width="1"/>
  <circle cx="23" cy="22" r="1.5" fill="#1d4ed8" stroke="white" stroke-width="1"/>
  <!-- Headlight -->
  <circle cx="23.5" cy="16" r="1.5" fill="#fbbf24"/>
  <!-- Chimney/exhaust -->
  <rect x="8" y="8" width="3" height="4" rx="1" fill="white" opacity="0.8"/>
</svg>
